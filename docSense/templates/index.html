<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocSense – RAG powered by Endee</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .loader { border-top-color: #6366f1; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.4s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

  <!-- Header -->
  <header class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">DS</div>
      <div>
        <h1 class="text-lg font-bold text-white">DocSense</h1>
        <p class="text-xs text-gray-400">RAG-powered Q&A · Endee Vector Database</p>
      </div>
    </div>
    <span id="statusBadge" class="text-xs px-3 py-1 rounded-full bg-gray-800 text-gray-400">checking...</span>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8 space-y-6">

    <!-- Upload Card -->
    <div class="bg-gray-900 rounded-2xl border border-gray-800 p-6">
      <h2 class="text-sm font-semibold text-indigo-400 uppercase tracking-wider mb-4">① Upload Document</h2>
      <div id="dropZone"
           class="border-2 border-dashed border-gray-700 rounded-xl p-8 text-center cursor-pointer hover:border-indigo-500 transition-colors"
           onclick="document.getElementById('fileInput').click()">
        <div class="text-4xl mb-2">📄</div>
        <p class="text-gray-300 font-medium">Click to upload or drag & drop</p>
        <p class="text-gray-500 text-sm mt-1">PDF, TXT, DOCX supported</p>
      </div>
      <input type="file" id="fileInput" accept=".pdf,.txt,.docx" class="hidden"/>

      <!-- Upload status -->
      <div id="uploadStatus" class="hidden mt-4 p-3 rounded-lg text-sm"></div>

      <!-- Upload button -->
      <button id="uploadBtn"
              onclick="uploadFile()"
              class="hidden mt-4 w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-xl transition-colors">
        Upload & Index Document
      </button>
    </div>

    <!-- Ask Card -->
    <div class="bg-gray-900 rounded-2xl border border-gray-800 p-6">
      <h2 class="text-sm font-semibold text-indigo-400 uppercase tracking-wider mb-4">② Ask a Question</h2>
      <div class="flex gap-3">
        <input id="questionInput"
               type="text"
               placeholder="Ask anything about your uploaded documents..."
               class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 transition-colors"
               onkeydown="if(event.key==='Enter') askQuestion()"/>
        <button onclick="askQuestion()"
                class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-5 py-3 rounded-xl transition-colors whitespace-nowrap">
          Ask ✦
        </button>
      </div>
    </div>

    <!-- Loading -->
    <div id="loadingDiv" class="hidden flex justify-center py-6">
      <div class="flex items-center gap-3 text-gray-400">
        <div class="loader w-6 h-6 rounded-full border-4 border-gray-700"></div>
        <span class="text-sm">Searching Endee & generating answer...</span>
      </div>
    </div>

    <!-- Answer Card -->
    <div id="answerCard" class="hidden fade-in bg-gray-900 rounded-2xl border border-gray-800 p-6 space-y-4">

      <h2 class="text-sm font-semibold text-indigo-400 uppercase tracking-wider">Answer</h2>
      <p id="answerText" class="text-gray-100 leading-relaxed text-sm"></p>

      <!-- Sources -->
      <div id="sourcesSection">
        <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Retrieved Chunks from Endee</h3>
        <div id="sourcesList" class="space-y-2"></div>
      </div>
    </div>

  </main>

  <script>
    let selectedFile = null;

    // ── Health check on load ──────────────────────────────────────────────────
    async function checkHealth() {
      try {
        const r = await fetch("/health");
        const d = await r.json();
        const badge = document.getElementById("statusBadge");
        if (d.endee === "connected") {
          badge.textContent = "🟢 Endee Connected";
          badge.className = "text-xs px-3 py-1 rounded-full bg-green-900 text-green-300";
        } else {
          badge.textContent = "🔴 Endee Error";
          badge.className = "text-xs px-3 py-1 rounded-full bg-red-900 text-red-300";
        }
      } catch {
        document.getElementById("statusBadge").textContent = "🔴 Offline";
      }
    }

    // ── File selection ────────────────────────────────────────────────────────
    document.getElementById("fileInput").addEventListener("change", function () {
      selectedFile = this.files[0];
      if (selectedFile) {
        const dropZone = document.getElementById("dropZone");
        dropZone.innerHTML = `
          <div class="text-4xl mb-2">✅</div>
          <p class="text-indigo-300 font-medium">${selectedFile.name}</p>
          <p class="text-gray-500 text-sm mt-1">${(selectedFile.size / 1024).toFixed(1)} KB · Ready to upload</p>
        `;
        document.getElementById("uploadBtn").classList.remove("hidden");
        document.getElementById("uploadStatus").classList.add("hidden");
      }
    });

    // ── Upload file ───────────────────────────────────────────────────────────
    async function uploadFile() {
      if (!selectedFile) return;

      const btn = document.getElementById("uploadBtn");
      const status = document.getElementById("uploadStatus");

      btn.textContent = "Uploading...";
      btn.disabled = true;

      const formData = new FormData();
      formData.append("file", selectedFile);

      try {
        const r = await fetch("/ingest", { method: "POST", body: formData });
        const d = await r.json();

        status.classList.remove("hidden");
        if (r.ok) {
          status.className = "mt-4 p-3 rounded-lg text-sm bg-green-900 text-green-300";
          status.textContent = `${d.message} · ${d.chunks_stored} chunks indexed into Endee`;
          btn.textContent = "✅ Indexed!";
        } else {
          status.className = "mt-4 p-3 rounded-lg text-sm bg-red-900 text-red-300";
          status.textContent = "Error: " + d.error;
          btn.textContent = "Upload & Index Document";
          btn.disabled = false;
        }
      } catch (e) {
        status.classList.remove("hidden");
        status.className = "mt-4 p-3 rounded-lg text-sm bg-red-900 text-red-300";
        status.textContent = "Upload failed: " + e.message;
        btn.textContent = "Upload & Index Document";
        btn.disabled = false;
      }
    }

    // ── Ask question ──────────────────────────────────────────────────────────
    async function askQuestion() {
      const input = document.getElementById("questionInput");
      const question = input.value.trim();
      if (!question) return;

      document.getElementById("loadingDiv").classList.remove("hidden");
      document.getElementById("answerCard").classList.add("hidden");

      try {
        const r = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        const d = await r.json();

        document.getElementById("loadingDiv").classList.add("hidden");
        document.getElementById("answerCard").classList.remove("hidden");
        document.getElementById("answerText").textContent = d.answer || d.error;

        // Render sources
        const list = document.getElementById("sourcesList");
        list.innerHTML = "";
        if (d.sources && d.sources.length > 0) {
          d.sources.forEach((s, i) => {
            const pct = Math.round(s.similarity * 100);
            list.innerHTML += `
              <div class="bg-gray-800 rounded-lg p-3 text-xs space-y-1">
                <div class="flex justify-between items-center">
                  <span class="text-indigo-300 font-medium">📄 ${s.source}</span>
                  <span class="text-gray-400 bg-gray-700 px-2 py-0.5 rounded-full">${pct}% match</span>
                </div>
                <p class="text-gray-400 leading-relaxed">${s.chunk}</p>
              </div>`;
          });
        } else {
          document.getElementById("sourcesSection").classList.add("hidden");
        }

      } catch (e) {
        document.getElementById("loadingDiv").classList.add("hidden");
        document.getElementById("answerText").textContent = "Error: " + e.message;
        document.getElementById("answerCard").classList.remove("hidden");
      }
    }

    // Run health check on page load
    checkHealth();
  </script>
</body>
</html>
